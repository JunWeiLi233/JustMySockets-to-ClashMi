name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Ruff check
        run: ruff check subscription-converter

      - name: Ruff format check
        run: ruff format --check subscription-converter

      - name: mypy
        run: mypy subscription-converter/subscription_converter

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The runtime is pinned to 3.12; we also test on 3.13 for forward-compat.
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run tests
        # Integration tests (e.g. real mihomo binary) are opt-in via marker.
        run: pytest -m "not integration"

      - name: Audit Python dependencies
        if: matrix.python-version == '3.12'
        run: pip-audit

  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the production image
        # Confirms the Dockerfile builds and the service starts + becomes healthy.
        run: |
          docker build -t subscription-converter:ci .
          docker run -d --name sc-ci -p 8000:8000 subscription-converter:ci
          # Wait for health (the image has a HEALTHCHECK).
          for i in $(seq 1 30); do
            status=$(docker inspect -f '{{.State.Health.Status}}' sc-ci 2>/dev/null || echo "starting")
            echo "health=$status"
            [ "$status" = "healthy" ] && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/health
          docker rm -f sc-ci
