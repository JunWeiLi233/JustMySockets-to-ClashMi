# Pre-commit hooks for subscription-converter.
# Install once with: pre-commit install
# Run manually with:   pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        # Type-check the package; tests are checked separately in CI.
        files: ^subscription-converter/subscription_converter/
        additional_dependencies:
          - cryptography>=48.0.1,<49.0
          - fastapi>=0.139,<0.140
          - httpx>=0.27,<0.30
          - pydantic>=2.9,<3.0
          - PyYAML>=6.0,<7.0
          - starlette>=1.3.1,<1.4
          - types-PyYAML>=6.0,<7.0
