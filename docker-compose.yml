services:
  converter:
    build: .
    image: subscription-converter:latest
    container_name: subscription-converter
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: "2"
      # How often the upstream subscription is re-downloaded (seconds).
      # The generated YAML always reflects the latest cached upstream payload.
      CACHE_TTL_SECONDS: "300"
      CACHE_MAX_ENTRIES: "512"
      FETCH_TIMEOUT_SECONDS: "15"
      TEST_URL: "https://www.gstatic.com/generate_204"
      TEST_INTERVAL: "300"
      LOG_LEVEL: "INFO"
      # Durable links are fail-closed and disabled until you provide a stable
      # 32-byte URL-safe base64 key. See README Part 5.
      PERSISTENT_LINKS_ENABLED: "${PERSISTENT_LINKS_ENABLED:-false}"
      LINK_DATABASE_PATH: "/var/data/subscriptions.sqlite3"
      LINK_SECRET_KEY: "${LINK_SECRET_KEY:-}"
      MAX_ACTIVE_LINKS: "${MAX_ACTIVE_LINKS:-100}"
      MAX_LINKS_PER_SOURCE: "${MAX_LINKS_PER_SOURCE:-3}"
      MAX_LINKS_PER_USER: "${MAX_LINKS_PER_USER:-3}"
      MAX_LINKS_PER_NETWORK: "${MAX_LINKS_PER_NETWORK:-10}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost:8000}"
      ADMIN_BOOTSTRAP_SECRET: "${ADMIN_BOOTSTRAP_SECRET:-}"
      TRUSTED_CLIENT_IP_HEADER: "${TRUSTED_CLIENT_IP_HEADER:-}"
      CHECK_RATE_LIMIT: "${CHECK_RATE_LIMIT:-30}"
      CHECK_RATE_WINDOW_SECONDS: "${CHECK_RATE_WINDOW_SECONDS:-60}"
      CREATE_RATE_LIMIT: "${CREATE_RATE_LIMIT:-5}"
      CREATE_RATE_WINDOW_SECONDS: "${CREATE_RATE_WINDOW_SECONDS:-3600}"
      CLOSE_RATE_LIMIT: "${CLOSE_RATE_LIMIT:-20}"
      CLOSE_RATE_WINDOW_SECONDS: "${CLOSE_RATE_WINDOW_SECONDS:-60}"
      ALLOW_LEGACY_URL_ENDPOINTS: "${ALLOW_LEGACY_URL_ENDPOINTS:-false}"
      # DNS resolvers (PUBLIC recursive resolvers, never proxy servers).
      DNS_NAMESERVER: "https://dns.alidns.com/dns-query,https://doh.pub/dns-query"
      DNS_FALLBACK: "https://1.1.1.1/dns-query,https://dns.google/dns-query"
      DNS_BOOTSTRAP: "223.5.5.5,119.29.29.29"
      DNS_FAKE_IP_RANGE: "198.18.0.1/16"
      DNS_IPV6: "false"
      # Optional allow-list of upstream subscription hostnames (comma separated).
      # ALLOWED_HOSTS: "jmssub.net,example.com"
    volumes:
      - subscription-data:/var/data
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/health' % os.environ.get('PORT','8000')).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  subscription-data:
